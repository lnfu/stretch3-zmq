# Stretch 3 Driver Configuration

# ZeroMQ Ports
ports:
  status: 5555
  command: 5556
  arducam: 6000
  d435if: 6001
  d405: 6002
  tts: 6101
  tts_status: 6102
  asr: 6103

# Service Settings
service:
  status_rate_hz: 15.0

# TTS Settings
tts:
  enabled: true
  provider: fish_audio
  voice_id: "e855dc04a51f48549b484e41c4d4d4cc"        # empty = provider default
  model_id: ~         # null = provider default
  output_format: pcm_22050  # ElevenLabs: pcm_22050 | pcm_24000 | pcm_44100 | pcm_48000
  speed: 0.7

# ASR Settings
asr:
  enabled: true
  provider: deepgram
  timeout_seconds: 10.0
  language: zh-TW
  model_id: ~  # null = use provider default
  microphone: "DJI MIC MINI"

# Camera Settings
cameras:
  arducam:
    enabled: true
    compressed: true
    device: "/dev/video6"  # Arducam OV9782 USB Camera
    width: 1280
    height: 720
    fps: 30

  d435if:
    enabled: true
    compressed: true
    serial: "239722074251"  # D435I serial number
    width: 640
    height: 480
    fps: 30

  d405:
    enabled: true
    compressed: true
    serial: "218622277115"  # D405 serial number
    width: 640
    height: 480
    fps: 15

# Trapezoid Motion Profile (velocity & acceleration limits per joint)
# robot.py maps these to v_m/a_m (prismatic: lift, arm) or v_r/a_r (rotary: all others)
trapezoid_profile:
  lift:
    v: 0.13
    a: 0.25
  arm:
    v: 0.05
    a: 0.05
  head_pan:
    v: 1.0
    a: 4.0
  head_tilt:
    v: 3.0
    a: 8.0
  wrist_yaw:
    v: 0.75
    a: 1.5
  wrist_pitch:
    v: 1.0
    a: 4.0
  wrist_roll:
    v: 1.0
    a: 4.0
  gripper:
    v: 6.0
    a: 19.0

# Other Settings
debug: false
